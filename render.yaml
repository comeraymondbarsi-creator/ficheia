services:
  - type: web
    name: mon-app
    env: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
